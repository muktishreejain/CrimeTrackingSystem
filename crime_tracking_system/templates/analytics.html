{% extends 'base.html' %}
{% block content %}
<div class="container">
    <h4 class="mb-3">Analytics Dashboard</h4>
    <div class="row g-3">
        <div class="col-md-6"><div class="card"><div class="card-body"><h6>Cases by Status</h6><canvas id="caseStatusChart"></canvas></div></div></div>
        <div class="col-md-6"><div class="card"><div class="card-body"><h6>Crimes by Severity</h6><canvas id="severityChart"></canvas></div></div></div>
        <div class="col-md-6"><div class="card"><div class="card-body"><h6>Police Station Workload</h6><canvas id="stationChart"></canvas></div></div></div>
        <div class="col-md-6"><div class="card"><div class="card-body"><h6>Officer Assignment Count</h6><canvas id="officerChart"></canvas></div></div></div>
        <div class="col-12"><div class="card"><div class="card-body"><h6>Monthly Crime Trends</h6><canvas id="monthlyChart"></canvas></div></div></div>
    </div>
</div>
<script id="chartDataJson" type="application/json">{{ chart_data|tojson }}</script>
{% endblock %}
