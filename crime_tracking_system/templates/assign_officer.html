{% extends 'base.html' %}
{% block content %}
<div class="container" style="max-width: 760px;">
    <div class="card">
        <div class="card-header bg-navy text-white"><h5 class="mb-0">Assign Officer to Case {{ caseid }}</h5></div>
        <div class="card-body">
            <form method="post" class="row g-3">
                <div class="col-md-8">
                    <label class="form-label">Officer</label>
                    <select name="OfficerID" class="form-select" required>
                        <option value="">Select Officer</option>
                        {% for officer in officers %}
                            <option value="{{ officer.OfficerID }}">{{ officer.Name }} ({{ officer.Rank }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Assigned Date</label>
                    <input type="date" name="AssignedDate" class="form-control" required>
                </div>
                <div class="col-12 text-end"><button class="btn btn-danger">Assign Officer</button></div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
